spring:
  profiles:
    default: http,query-only
  application:
    name: druid-mcp-server
  config:
    import: optional:classpath:prompts.properties
  ai:
    mcp:
      server:
        name: druid-mcp-server
        version: 2.0.0

druid:
  router:
    url: http://localhost:8888
  coordinator:
    url: ""
  auth:
    username: ""
    password: ""
  ssl:
    enabled: false
    skip-verification: false

  mcp:
    tools:
      enabled: []
    metrics:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details:
